<script type="text/babel" data-presets="react">
const { useState, useRef, useEffect, createContext, useContext } = React;

/* =========================================================================
   UTILITÁRIOS DE DATA
   ========================================================================= */
function hojeISO() {
  const d = new Date();
  return new Date(d.getFullYear(), d.getMonth(), d.getDate()).toISOString().slice(0, 10);
}
function diffDias(dataISO) {
  const hoje = new Date(hojeISO() + "T00:00:00");
  const data = new Date(dataISO + "T00:00:00");
  return Math.round((data - hoje) / 86400000);
}
function semanaAtual() {
  const hoje = new Date();
  const diaSemanaHoje = hoje.getDay();
  const segunda = new Date(hoje);
  segunda.setDate(hoje.getDate() + (diaSemanaHoje === 0 ? -6 : 1 - diaSemanaHoje));
  const nomesDias = ["Dom", "Seg", "Ter", "Qua", "Qui", "Sex", "Sáb"];
  return Array.from({ length: 7 }, (_, i) => {
    const d = new Date(segunda);
    d.setDate(segunda.getDate() + i);
    const iso = d.toISOString().slice(0, 10);
    return { iso, label: nomesDias[d.getDay()], dataCurta: `${String(d.getDate()).padStart(2, "0")}/${String(d.getMonth() + 1).padStart(2, "0")}` };
  });
}

/* =========================================================================
   RECONHECIMENTO AUTOMÁTICO DE COLUNAS DO EXCEL
   Procura, entre os cabeçalhos da planilha, algo parecido com cada campo
   que o sistema precisa. Se não encontrar, usa um valor padrão — nada quebra.
   ========================================================================= */
const CAMPO_PATTERNS = {
  numero: ["numero", "número", "num", "nº", "ordem", "wo number", "wo#", "wo #", "work order"],
  titulo: ["titulo", "título", "title", "atividade"],
  tipo: ["wo type", "tipo", "type"],
  descricao: ["descricao", "descrição", "description", "servico", "serviço", "observacao", "observação"],
  equipamento: ["equipamento", "ativo", "maquina", "máquina", "asset"],
  prioridade: ["prioridade", "priority"],
  executor: ["executor", "responsavel", "responsável", "mecanico", "mecânico", "labor", "technician"],
  planejador: ["planejador", "planner"],
  dataFechamento: ["close date", "closedate", "data de fechamento", "vencimento", "prazo", "data"],
  status: ["status", "situacao", "situação"],
};

function semAcento(s) {
  return String(s).normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
}
function encontrarCampo(chaves, patterns) {
  for (const chave of chaves) {
    const k = semAcento(chave);
    if (patterns.some((p) => k.includes(semAcento(p)))) return chave;
  }
  return null;
}
function paraISO(valor) {
  if (!valor) return null;
  if (valor instanceof Date) return valor.toISOString().slice(0, 10);
  const d = new Date(valor);
  if (!isNaN(d.getTime())) return d.toISOString().slice(0, 10);
  return null;
}
function formatarDataCurta(iso) {
  if (!iso) return "—";
  const [ano, mes, dia] = iso.split("-");
  return `${dia}/${mes}`;
}
function normalizarLinhas(linhasBrutas) {
  if (!linhasBrutas.length) return [];
  const chaves = Object.keys(linhasBrutas[0]);
  const mapa = {};
  for (const campo in CAMPO_PATTERNS) mapa[campo] = encontrarCampo(chaves, CAMPO_PATTERNS[campo]);
  return linhasBrutas.map((linha, i) => ({
    id: `import-${Date.now()}-${i}`,
    numero: (mapa.numero && linha[mapa.numero]) || `OS-${1000 + i}`,
    titulo: (mapa.titulo && linha[mapa.titulo]) || "Sem título",
    tipo: (mapa.tipo && linha[mapa.tipo]) || "—",
    descricao: (mapa.descricao && linha[mapa.descricao]) || "",
    equipamento: (mapa.equipamento && linha[mapa.equipamento]) || "—",
    prioridade: (mapa.prioridade && linha[mapa.prioridade]) || "Média",
    executor: (mapa.executor && linha[mapa.executor]) || "Não atribuído",
    planejador: (mapa.planejador && linha[mapa.planejador]) || "—",
    dataFechamento: (mapa.dataFechamento && paraISO(linha[mapa.dataFechamento])) || hojeISO(),
    status: (mapa.status && linha[mapa.status]) || "Aberta",
    diaAgendado: null,
  }));
}

/* =========================================================================
   DADOS DE EXEMPLO — aparecem até você importar uma planilha real
   ========================================================================= */
function seedOrdens() {
  const hoje = new Date();
  const iso = (offset) => {
    const d = new Date(hoje);
    d.setDate(d.getDate() + offset);
    return d.toISOString().slice(0, 10);
  };
  return [
    { id: "seed-1", numero: "OS-2026-0470", tipo: "Preventiva", titulo: "Calibração de sensores de pressão", descricao: "", equipamento: "Caldeira Industrial 01", prioridade: "Alta", executor: "Rafael Costa", planejador: "Bruno Teixeira", dataFechamento: iso(-6), status: "Aberta", diaAgendado: null },
    { id: "seed-2", numero: "OS-2026-0477", tipo: "Corretiva", titulo: "Disjuntor desarmando de forma intermitente", descricao: "", equipamento: "Painel Elétrico Geral", prioridade: "Emergencial", executor: "Rafael Costa", planejador: "Bruno Teixeira", dataFechamento: iso(-3), status: "Atrasada", diaAgendado: null },
    { id: "seed-3", numero: "OS-2026-0482", tipo: "Corretiva", titulo: "Vazamento de óleo no selo mecânico", descricao: "", equipamento: "Compressor de Ar 02", prioridade: "Alta", executor: "Carlos Mendes", planejador: "Ana Ribeiro", dataFechamento: iso(0), status: "Em Andamento", diaAgendado: null },
    { id: "seed-4", numero: "OS-2026-0481", tipo: "Corretiva", titulo: "Ruído anormal no motor de tração", descricao: "", equipamento: "Esteira Transportadora A3", prioridade: "Média", executor: "Juliana Alves", planejador: "Pedro Souza", dataFechamento: iso(3), status: "Aberta", diaAgendado: null },
    { id: "seed-5", numero: "OS-2026-0479", tipo: "Preventiva", titulo: "Manutenção preventiva trimestral", descricao: "", equipamento: "Prensa Hidráulica 01", prioridade: "Baixa", executor: "Marcos Lima", planejador: "Ana Ribeiro", dataFechamento: iso(9), status: "Aberta", diaAgendado: null },
    { id: "seed-6", numero: "OS-2026-0468", tipo: "Preventiva", titulo: "Substituição de rolamento do eixo principal", descricao: "", equipamento: "Linha de Envase 03", prioridade: "Alta", executor: "Marcos Lima", planejador: "Pedro Souza", dataFechamento: iso(22), status: "Aberta", diaAgendado: null },
  ];
}

/* =========================================================================
   CONTEXTO GLOBAL — o "cofre" de dados que qualquer aba pode ler
   ========================================================================= */
const OrdensContext = createContext(null);
function useOrdens() {
  return useContext(OrdensContext);
}
function OrdensProvider({ children }) {
  const [ordens, setOrdens] = useState(() => {
    try {
      const salvo = localStorage.getItem("os-ordens");
      if (salvo) return JSON.parse(salvo);
    } catch (e) {}
    return seedOrdens();
  });
  const [ultimaImportacao, setUltimaImportacao] = useState(null);

  useEffect(() => {
    try { localStorage.setItem("os-ordens", JSON.stringify(ordens)); } catch (e) {}
  }, [ordens]);

  function salvarOrdensImportadas(linhasBrutas) {
    const normalizadas = normalizarLinhas(linhasBrutas);
    setOrdens(normalizadas);
    setUltimaImportacao({ quando: new Date().toLocaleString("pt-BR"), total: normalizadas.length });
    return normalizadas.length;
  }

  function agendarOrdem(ordemId, diaISO) {
    setOrdens((prev) => prev.map((o) => (o.id === ordemId ? { ...o, diaAgendado: diaISO } : o)));
  }

  function editarOrdem(ordemId, campos) {
    setOrdens((prev) => prev.map((o) => (o.id === ordemId ? { ...o, ...campos } : o)));
  }

  function excluirOrdem(ordemId) {
    setOrdens((prev) => prev.filter((o) => o.id !== ordemId));
  }

  return (
    <OrdensContext.Provider value={{ ordens, salvarOrdensImportadas, agendarOrdem, editarOrdem, excluirOrdem, ultimaImportacao }}>
      {children}
    </OrdensContext.Provider>
  );
}

/* =========================================================================
   PRIMITIVOS VISUAIS
   ========================================================================= */
const statusStyles = {
  "Aberta": "bg-sky-50 text-sky-700 border-sky-200",
  "Em Andamento": "bg-amber-50 text-amber-700 border-amber-200",
  "Concluída": "bg-emerald-50 text-emerald-700 border-emerald-200",
  "Atrasada": "bg-red-50 text-red-700 border-red-200",
};
function StatusBadge({ status }) {
  return <span className={`inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium border whitespace-nowrap ${statusStyles[status] || "bg-neutral-100 text-neutral-600 border-neutral-200"}`}>{status}</span>;
}
const priorityStyles = {
  "Baixa": "bg-neutral-100 text-neutral-600 border-neutral-200",
  "Média": "bg-amber-50 text-amber-700 border-amber-200",
  "Alta": "bg-orange-50 text-orange-700 border-orange-200",
  "Emergencial": "bg-red-50 text-red-700 border-red-200",
};
function PriorityBadge({ priority }) {
  return <span className={`inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium border whitespace-nowrap ${priorityStyles[priority] || "bg-neutral-100 text-neutral-600 border-neutral-200"}`}>{priority}</span>;
}
const avatarColors = ["#f97316", "#0ea5e9", "#10b981", "#f59e0b", "#ec4899", "#8b5cf6"];
function hashColor(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = name.charCodeAt(i) + ((h << 5) - h);
  return avatarColors[Math.abs(h) % avatarColors.length];
}
function Avatar({ name, size = 20 }) {
  const iniciais = name.split(" ").map((n) => n[0]).slice(0, 2).join("").toUpperCase();
  return (
    <div className="rounded-full flex items-center justify-center font-mono font-semibold text-neutral-900 shrink-0" style={{ width: size, height: size, background: hashColor(name), fontSize: size * 0.4 }}>
      {iniciais}
    </div>
  );
}

/* =========================================================================
   DASHBOARD (placeholder)
   ========================================================================= */
function DashboardPage() {
  const { ordens } = useOrdens();
  return (
    <div className="h-full min-h-0 flex items-center justify-center animate-fadeIn">
      <div className="text-center max-w-sm">
        <div className="w-12 h-12 mx-auto mb-3 rounded-xl bg-orange-50 flex items-center justify-center text-orange-600 font-display font-semibold">D</div>
        <h2 className="font-display text-sm font-semibold text-neutral-800 mb-1">Dashboard</h2>
        <p className="text-xs text-neutral-500">
          {ordens.length} ordens carregadas. Cards, filtros e gráficos chegam aqui mais adiante — combinamos priorizar o Planejamento primeiro.
        </p>
      </div>
    </div>
  );
}

/* =========================================================================
   IMPORTAR EXCEL
   ========================================================================= */
function ImportacaoPage({ onIrParaPlanejamento }) {
  const { salvarOrdensImportadas, ultimaImportacao } = useOrdens();
  const [fileName, setFileName] = useState(null);
  const [rows, setRows] = useState([]);
  const [columns, setColumns] = useState([]);
  const [error, setError] = useState(null);
  const [loading, setLoading] = useState(false);
  const [totalSalvo, setTotalSalvo] = useState(null);
  const inputRef = useRef(null);

  function processFile(file) {
    if (!file) return;
    setError(null);
    setTotalSalvo(null);
    setLoading(true);
    setFileName(file.name);

    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, { type: "array", cellDates: true });
        const sheetName = workbook.SheetNames[0];
        const sheet = workbook.Sheets[sheetName];
        const json = XLSX.utils.sheet_to_json(sheet, { defval: "" });

        if (!json.length) {
          setError("A planilha foi lida, mas não encontrei nenhuma linha de dados. Confira se a primeira aba tem um cabeçalho e pelo menos uma linha.");
          setRows([]);
          setColumns([]);
        } else {
          setColumns(Object.keys(json[0]));
          setRows(json);
          const total = salvarOrdensImportadas(json);
          setTotalSalvo(total);
        }
      } catch (err) {
        setError("Não consegui ler esse arquivo. Confira se é um .xlsx ou .xls válido.");
        setRows([]);
        setColumns([]);
      } finally {
        setLoading(false);
      }
    };
    reader.onerror = () => {
      setError("Houve um problema ao abrir o arquivo.");
      setLoading(false);
    };
    reader.readAsArrayBuffer(file);
  }

  function handleInputChange(e) { processFile(e.target.files && e.target.files[0]); }
  function handleDrop(e) { e.preventDefault(); processFile(e.dataTransfer.files && e.dataTransfer.files[0]); }

  return (
    <div className="h-full min-h-0 flex flex-col gap-3 animate-fadeIn">
      <div>
        <h2 className="font-display text-sm font-semibold text-neutral-800">Importar Excel</h2>
        <p className="text-xs text-neutral-500 mt-0.5">
          Ao importar, tento reconhecer sozinho as colunas (número, descrição, equipamento, prioridade,
          executor, planejador, data, status) e já guardo tudo para o Planejamento usar.
        </p>
      </div>

      <div
        onDragOver={(e) => e.preventDefault()}
        onDrop={handleDrop}
        onClick={() => inputRef.current && inputRef.current.click()}
        className="shrink-0 bg-white border-2 border-dashed border-neutral-300 rounded-lg py-10 px-4 flex flex-col items-center justify-center gap-2 cursor-pointer hover:border-orange-400 hover:bg-orange-50 transition-colors"
      >
        <div className="w-10 h-10 rounded-lg bg-orange-50 text-orange-600 flex items-center justify-center font-display font-semibold">XL</div>
        <p className="text-sm text-neutral-700 font-medium">Toque para escolher o arquivo</p>
        <p className="text-xs text-neutral-400">.xlsx ou .xls</p>
        <input ref={inputRef} type="file" accept=".xlsx,.xls" onChange={handleInputChange} className="hidden" />
      </div>

      {loading && <p className="text-xs text-neutral-500">Lendo {fileName}...</p>}
      {error && <div className="shrink-0 bg-red-50 border border-red-200 text-red-700 text-xs rounded-lg px-3 py-2">{error}</div>}

      {totalSalvo !== null && (
        <div className="shrink-0 bg-emerald-50 border border-emerald-200 text-emerald-700 text-xs rounded-lg px-3 py-2 flex items-center justify-between gap-3 flex-wrap">
          <span>{totalSalvo} ordens salvas e prontas no Planejamento.</span>
          <button onClick={onIrParaPlanejamento} className="text-emerald-800 font-medium underline underline-offset-2 shrink-0">
            Ver Planejamento →
          </button>
        </div>
      )}

      {!!rows.length && (
        <div className="flex-1 min-h-0 flex flex-col bg-white border border-neutral-200 rounded-lg shadow-sm overflow-hidden">
          <div className="shrink-0 flex items-center justify-between px-3 py-2 border-b border-neutral-200">
            <h3 className="font-display text-xs font-semibold text-neutral-900">Prévia — {fileName}</h3>
            <span className="text-xs text-neutral-500 font-mono">{rows.length} linhas lidas</span>
          </div>
          <div className="flex-1 min-h-0 overflow-auto os-scroll">
            <table className="w-full text-xs">
              <thead className="sticky top-0 bg-white z-10">
                <tr className="text-left text-neutral-500 uppercase tracking-wider border-b border-neutral-200">
                  {columns.map((c) => <th key={c} className="px-3 py-1.5 font-medium whitespace-nowrap">{c}</th>)}
                </tr>
              </thead>
              <tbody>
                {rows.slice(0, 50).map((row, i) => (
                  <tr key={i} className="border-t border-neutral-100 hover:bg-neutral-50">
                    {columns.map((c) => <td key={c} className="px-3 py-1.5 text-neutral-700 whitespace-nowrap">{String(row[c])}</td>)}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          {rows.length > 50 && <div className="shrink-0 px-3 py-1.5 text-xs text-neutral-400 border-t border-neutral-100">Mostrando as primeiras 50 de {rows.length} linhas.</div>}
        </div>
      )}
    </div>
  );
}

/* =========================================================================
   PLANEJAMENTO — lista de pendentes + calendário da semana (Etapa 5)
   Duas formas de mover uma ordem, pra funcionar em qualquer aparelho:
   - Mouse: arrastar (draggable / onDrag*)
   - Toque: selecionar a ordem e depois tocar no destino
   ========================================================================= */
function rotuloPrazo(dias) {
  if (dias < 0) return { texto: `Atrasada há ${Math.abs(dias)} dia${Math.abs(dias) > 1 ? "s" : ""}`, cor: "text-red-600" };
  if (dias === 0) return { texto: "Vence hoje", cor: "text-orange-600" };
  return { texto: `Em ${dias} dia${dias > 1 ? "s" : ""}`, cor: "text-neutral-500" };
}

/* Lista densa de pendentes — WO Number / WO Type / Title / Close Date / Labor,
   ordenada por Close Date (atrasadas sempre primeiro), até 30 dias à frente. */
function ListaPendentes({ pendentes, destaqueId, onDragStart, onAbrirDetalhe }) {
  return (
    <table className="w-full text-xs border-collapse">
      <thead className="sticky top-0 bg-neutral-50 z-10">
        <tr className="text-left text-neutral-500 uppercase tracking-wider border-b border-neutral-200">
          <th className="px-2 py-1.5 font-medium whitespace-nowrap">WO Number</th>
          <th className="px-2 py-1.5 font-medium whitespace-nowrap">WO Type</th>
          <th className="px-2 py-1.5 font-medium">Title</th>
          <th className="px-2 py-1.5 font-medium whitespace-nowrap">Close Date</th>
          <th className="px-2 py-1.5 font-medium whitespace-nowrap">Labor</th>
        </tr>
      </thead>
      <tbody>
        {pendentes.map((o) => {
          const dias = diffDias(o.dataFechamento);
          const prazo = rotuloPrazo(dias);
          const destacado = o.id === destaqueId;
          return (
            <tr
              key={o.id}
              draggable
              onDragStart={(e) => onDragStart(e, o.id)}
              onClick={() => onAbrirDetalhe(o.id)}
              title={prazo.texto}
              className={`border-t border-neutral-100 cursor-pointer transition-colors ${destacado ? "bg-orange-50" : "hover:bg-white"}`}
            >
              <td className="px-2 py-1.5 font-mono text-orange-600 whitespace-nowrap">{o.numero}</td>
              <td className="px-2 py-1.5 text-neutral-500 whitespace-nowrap">{o.tipo}</td>
              <td className="px-2 py-1.5 text-neutral-800 max-w-[160px] truncate">{o.titulo}</td>
              <td className={`px-2 py-1.5 font-mono whitespace-nowrap ${prazo.cor}`}>{formatarDataCurta(o.dataFechamento)}</td>
              <td className="px-2 py-1.5 text-neutral-500 whitespace-nowrap truncate max-w-[110px]">{o.executor}</td>
            </tr>
          );
        })}
      </tbody>
    </table>
  );
}

function CardAgendado({ ordem, destaque, onDragStart, onAbrirDetalhe }) {
  return (
    <div
      draggable
      onDragStart={(e) => onDragStart(e, ordem.id)}
      onClick={() => onAbrirDetalhe(ordem.id)}
      className={`bg-white border rounded-md p-2 cursor-pointer hover:border-orange-300 hover:shadow-sm transition-all ${
        destaque ? "border-orange-400 ring-2 ring-orange-300" : "border-neutral-200"
      }`}
    >
      <div className="flex items-center justify-between mb-1 gap-1">
        <span className="font-mono text-xs text-orange-600 truncate">{ordem.numero}</span>
        <span className="text-xs text-neutral-400 truncate shrink-0">{ordem.tipo}</span>
      </div>
      <p className="text-xs text-neutral-800 font-medium leading-snug mb-1 truncate">{ordem.titulo}</p>
      <div className="flex items-center justify-between gap-1">
        <span className="text-xs font-mono text-neutral-500">{formatarDataCurta(ordem.dataFechamento)}</span>
        <span className="text-xs text-neutral-500 truncate">{ordem.executor}</span>
      </div>
    </div>
  );
}

function CalendarioSemana({ ordens, destaqueId, dragOverAlvo, onDragStart, onDragOver, onDrop, onAbrirDetalhe }) {
  const dias = semanaAtual();
  const hojeStr = hojeISO();

  return (
    <div className="flex-1 min-w-0 flex gap-2 overflow-x-auto os-scroll pb-1">
      {dias.map((d) => {
        const isHoje = d.iso === hojeStr;
        const emDrag = dragOverAlvo === d.iso;
        const cardsDoDia = ordens.filter((o) => o.diaAgendado === d.iso);
        return (
          <div
            key={d.iso}
            onDragOver={(e) => onDragOver(e, d.iso)}
            onDrop={(e) => onDrop(e, d.iso)}
            className={`flex flex-col w-[150px] shrink-0 rounded-lg border p-1.5 transition-colors ${
              emDrag ? "border-orange-400 bg-orange-50" : isHoje ? "border-orange-300 bg-orange-50" : "border-neutral-200 bg-white"
            }`}
          >
            <div className="shrink-0 px-1 pb-1.5 mb-1 border-b border-neutral-200">
              <p className={`text-xs font-medium uppercase tracking-wide ${isHoje ? "text-orange-600" : "text-neutral-400"}`}>{d.label}</p>
              <p className={`font-mono text-xs ${isHoje ? "text-orange-600 font-semibold" : "text-neutral-600"}`}>{d.dataCurta}</p>
            </div>
            <div className="flex-1 flex flex-col gap-1.5 overflow-y-auto os-scroll" style={{ minHeight: "300px" }}>
              {cardsDoDia.length === 0 && <p className="text-xs text-neutral-300 text-center px-2 py-6">Arraste uma ordem aqui</p>}
              {cardsDoDia.map((o) => (
                <CardAgendado key={o.id} ordem={o} destaque={o.id === destaqueId} onDragStart={onDragStart} onAbrirDetalhe={onAbrirDetalhe} />
              ))}
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* Sidebar de detalhes — abre do lado direito ao tocar/clicar num card.
   Permite editar os campos principais, mover para outro dia e excluir. */
function SidebarDetalhe({ ordem, onFechar, onEditar, onMover, onExcluir }) {
  if (!ordem) return null;
  const dias = semanaAtual();

  function campoTexto(label, valor, campo) {
    return (
      <div>
        <label className="text-xs text-neutral-400 uppercase tracking-wide block mb-1">{label}</label>
        <input
          type="text"
          value={valor}
          onChange={(e) => onEditar(ordem.id, { [campo]: e.target.value })}
          className="w-full text-sm border border-neutral-200 rounded-md px-2 py-1.5 focus:outline-none focus:ring-2 focus:ring-orange-300"
        />
      </div>
    );
  }

  return (
    <div className="fixed inset-0 z-40 flex justify-end">
      <div className="absolute inset-0 bg-black/30" onClick={onFechar} />
      <div className="relative w-full max-w-sm h-full bg-white border-l border-neutral-200 shadow-xl flex flex-col animate-fadeIn">
        <div className="shrink-0 flex items-center justify-between px-4 py-3 border-b border-neutral-200">
          <span className="font-mono text-xs text-orange-600">{ordem.numero}</span>
          <button onClick={onFechar} className="text-neutral-400 hover:text-neutral-700 text-xl leading-none px-1">×</button>
        </div>

        <div className="flex-1 min-h-0 overflow-y-auto os-scroll p-4 flex flex-col gap-4">
          {campoTexto("Title", ordem.titulo, "titulo")}

          <div>
            <label className="text-xs text-neutral-400 uppercase tracking-wide block mb-1">Descrição</label>
            <textarea
              value={ordem.descricao}
              onChange={(e) => onEditar(ordem.id, { descricao: e.target.value })}
              rows={3}
              placeholder="Detalhes da atividade a ser executada..."
              className="w-full text-sm border border-neutral-200 rounded-md px-2 py-1.5 focus:outline-none focus:ring-2 focus:ring-orange-300 resize-none"
            />
          </div>

          {campoTexto("Equipamento", ordem.equipamento, "equipamento")}

          <div className="grid grid-cols-2 gap-3">
            <div>
              <label className="text-xs text-neutral-400 uppercase tracking-wide block mb-1">WO Type</label>
              <input type="text" value={ordem.tipo} onChange={(e) => onEditar(ordem.id, { tipo: e.target.value })} className="w-full text-sm border border-neutral-200 rounded-md px-2 py-1.5 focus:outline-none focus:ring-2 focus:ring-orange-300" />
            </div>
            <div>
              <label className="text-xs text-neutral-400 uppercase tracking-wide block mb-1">Prioridade</label>
              <select value={ordem.prioridade} onChange={(e) => onEditar(ordem.id, { prioridade: e.target.value })} className="w-full text-sm border border-neutral-200 rounded-md px-2 py-1.5 bg-white focus:outline-none focus:ring-2 focus:ring-orange-300">
                <option>Baixa</option><option>Média</option><option>Alta</option><option>Emergencial</option>
              </select>
            </div>
          </div>

          <div className="grid grid-cols-2 gap-3">
            <div>
              <label className="text-xs text-neutral-400 uppercase tracking-wide block mb-1">Status</label>
              <select value={ordem.status} onChange={(e) => onEditar(ordem.id, { status: e.target.value })} className="w-full text-sm border border-neutral-200 rounded-md px-2 py-1.5 bg-white focus:outline-none focus:ring-2 focus:ring-orange-300">
                <option>Aberta</option><option>Em Andamento</option><option>Concluída</option><option>Atrasada</option>
              </select>
            </div>
            <div>
              <label className="text-xs text-neutral-400 uppercase tracking-wide block mb-1">Close Date</label>
              <input type="date" value={ordem.dataFechamento} onChange={(e) => onEditar(ordem.id, { dataFechamento: e.target.value })} className="w-full text-sm border border-neutral-200 rounded-md px-2 py-1.5 focus:outline-none focus:ring-2 focus:ring-orange-300" />
            </div>
          </div>

          {campoTexto("Labor", ordem.executor, "executor")}
          {campoTexto("Planejador", ordem.planejador, "planejador")}

          <div>
            <p className="text-xs text-neutral-400 uppercase tracking-wide mb-2">Mover para</p>
            <div className="grid grid-cols-4 gap-1.5">
              {dias.map((d) => (
                <button
                  key={d.iso}
                  onClick={() => onMover(ordem.id, d.iso)}
                  className={`text-xs rounded-md py-1.5 border transition-colors ${
                    ordem.diaAgendado === d.iso ? "bg-orange-600 text-neutral-900 border-orange-600" : "bg-white border-neutral-200 text-neutral-600 hover:border-orange-300"
                  }`}
                >
                  {d.label}
                </button>
              ))}
              <button
                onClick={() => onMover(ordem.id, null)}
                className={`col-span-4 text-xs rounded-md py-1.5 border transition-colors ${
                  !ordem.diaAgendado ? "bg-neutral-800 text-white border-neutral-800" : "bg-white border-neutral-200 text-neutral-600 hover:border-neutral-400"
                }`}
              >
                Voltar para Pendentes
              </button>
            </div>
          </div>
        </div>

        <div className="shrink-0 px-4 py-3 border-t border-neutral-200">
          <button
            onClick={() => { if (window.confirm("Excluir esta ordem definitivamente?")) { onExcluir(ordem.id); onFechar(); } }}
            className="w-full text-xs text-red-600 hover:text-red-700 font-medium py-1.5"
          >
            Excluir ordem
          </button>
        </div>
      </div>
    </div>
  );
}

function PlanejamentoPage() {
  const { ordens, agendarOrdem, editarOrdem, excluirOrdem } = useOrdens();
  const [dragOverAlvo, setDragOverAlvo] = useState(null);
  const [ordemDetalheId, setOrdemDetalheId] = useState(null);

  const pendentes = ordens
    .filter((o) => !o.diaAgendado && diffDias(o.dataFechamento) <= 30)
    .sort((a, b) => diffDias(a.dataFechamento) - diffDias(b.dataFechamento));

  const ordemDetalhe = ordens.find((o) => o.id === ordemDetalheId) || null;

  function handleDragStart(e, ordemId) {
    e.dataTransfer.setData("text/plain", ordemId);
    e.dataTransfer.effectAllowed = "move";
  }
  function handleDragOver(e, alvo) {
    e.preventDefault();
    if (dragOverAlvo !== alvo) setDragOverAlvo(alvo);
  }
  function handleDrop(e, alvo) {
    e.preventDefault();
    const ordemId = e.dataTransfer.getData("text/plain");
    setDragOverAlvo(null);
    if (ordemId) agendarOrdem(ordemId, alvo === "pendentes" ? null : alvo);
  }

  return (
    <div className="h-full min-h-0 flex flex-col gap-3 animate-fadeIn">
      <div>
        <h2 className="font-display text-sm font-semibold text-neutral-800">Planejamento</h2>
        <p className="text-xs text-neutral-500 mt-0.5">
          Pendentes ordenadas por Close Date (atrasadas primeiro), até 30 dias à frente. Toque numa ordem para ver e editar os detalhes. No computador, também dá pra arrastar direto pro calendário.
        </p>
      </div>
      <div className="flex-1 min-h-0 flex flex-col lg:flex-row gap-3">
        <div
          onDragOver={(e) => handleDragOver(e, "pendentes")}
          onDrop={(e) => handleDrop(e, "pendentes")}
          className={`lg:w-[420px] shrink-0 flex flex-col border rounded-lg p-2 transition-colors ${
            dragOverAlvo === "pendentes" ? "border-orange-400 bg-orange-50" : "border-neutral-200 bg-neutral-50"
          }`}
          style={{ maxHeight: "420px" }}
        >
          <div className="shrink-0 flex items-center justify-between px-1 pb-2">
            <h3 className="text-xs font-semibold text-neutral-600 uppercase tracking-wide">Pendentes</h3>
            <span className="text-xs text-neutral-400 font-mono">{pendentes.length}</span>
          </div>
          <div className="flex-1 min-h-0 overflow-auto os-scroll">
            {pendentes.length === 0 ? (
              <p className="text-xs text-neutral-400 text-center py-6">Nada pendente nos próximos 30 dias.</p>
            ) : (
              <ListaPendentes pendentes={pendentes} destaqueId={ordemDetalheId} onDragStart={handleDragStart} onAbrirDetalhe={setOrdemDetalheId} />
            )}
          </div>
        </div>
        <CalendarioSemana
          ordens={ordens}
          destaqueId={ordemDetalheId}
          dragOverAlvo={dragOverAlvo}
          onDragStart={handleDragStart}
          onDragOver={handleDragOver}
          onDrop={handleDrop}
          onAbrirDetalhe={setOrdemDetalheId}
        />
      </div>

      <SidebarDetalhe
        ordem={ordemDetalhe}
        onFechar={() => setOrdemDetalheId(null)}
        onEditar={editarOrdem}
        onMover={agendarOrdem}
        onExcluir={excluirOrdem}
      />
    </div>
  );
}

/* =========================================================================
   CASCA (menu + abas)

  const [activeTab, setActiveTab] = useState("importar");
  const tabs = [
    { key: "dashboard", label: "Dashboard" },
    { key: "planejamento", label: "Planejamento" },
    { key: "importar", label: "Importar" },

  return (
    <OrdensProvider>
      <div className="h-screen w-full flex bg-neutral-100 text-neutral-900 font-body overflow-hidden">
        <aside className="hidden md:flex flex-col items-center w-16 shrink-0 border-r border-neutral-200 bg-white py-4 gap-1">
          <div className="w-9 h-9 rounded-lg bg-gradient-to-br from-orange-500 to-orange-700 flex items-center justify-center font-display font-bold text-sm text-neutral-900 mb-4">M</div>
          <div className="w-10 h-10 flex items-center justify-center rounded-lg bg-orange-50 text-orange-600 text-xs font-semibold" title="Ordens de Serviço">OS</div>
        </aside>

        <div className="flex-1 flex flex-col min-w-0">
          <header className="shrink-0 flex flex-wrap items-center justify-between gap-3 px-4 md:px-5 py-2.5 border-b border-neutral-200 bg-white">
            <div>
              <h1 className="font-display text-base font-semibold text-neutral-900 leading-tight">Ordens de Serviço</h1>
              <p className="text-xs text-neutral-500 leading-tight">Gestão da Manutenção Industrial</p>
            </div>
            <nav className="flex items-center gap-1 bg-neutral-100 border border-neutral-200 rounded-full p-1 flex-wrap">
              {tabs.map((t) => (
                <button key={t.key} onClick={() => setActiveTab(t.key)} className={`px-4 py-1.5 rounded-full text-sm font-medium transition-colors ${activeTab === t.key ? "bg-orange-600 text-neutral-900" : "text-neutral-500 hover:text-neutral-700"}`}>
                  {t.label}

          <main className="flex-1 min-h-0 overflow-y-auto os-scroll px-4 md:px-5 py-3">

      </div>
    </OrdensProvider>
  );
}
